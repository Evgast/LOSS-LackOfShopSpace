[manifest]
version = "1.0.0"
dump_lua = true
priority = -10

[[patches]]
[patches.pattern]
target = "functions/UI_definitions.lua"
pattern = '''
        function G.UIDEF.shop()
'''
position = "after"
payload = '''
    local low_node = nil
    local mid_node = nil
    local high_node = nil
    local shop_buttons
    if next(G.low_buttons) then
        mid_node = {n=G.UIT.R,config={G.C.CLEAR, align = "cm"}, nodes = G.low_buttons}
    end
    if next(G.mid_buttons) then
        mid_node = {n=G.UIT.R,config={G.C.CLEAR, align = "cm"}, nodes = G.mid_buttons}
    end
    if next(G.high_buttons) then
        mid_node = {n=G.UIT.R,config={G.C.CLEAR, align = "cm"}, nodes = G.high_buttons}
    end
    local shop_scrollbox = SMODS.UIScrollBox({
            content = {
                definition = {n=G.UIT.ROOT, config={align = "cm", w = 10, h = 10, colour = G.C.BLACK, r = 0.1}, nodes = { 
                    {n=G.UIT.C, config={align = "cm", padding = 0.1}, nodes={
                        high_node,
                        {n=G.UIT.R,config={id = 'next_round_button', align = "cm", minw = 2.8, minh = 1.5, r=0.15,colour = G.C.RED, one_press = true, button = 'toggle_shop', hover = true,shadow = true}, nodes = {
                            {n=G.UIT.R, config={align = "cm", padding = 0.07, focus_args = {button = 'y', orientation = 'cr'}, func = 'set_button_pip'}, nodes={
                            {n=G.UIT.R, config={align = "cm", maxw = 1.3}, nodes={
                                {n=G.UIT.T, config={text = localize('b_next_round_1'), scale = 0.4, colour = G.C.WHITE, shadow = true}}
                            }},
                            {n=G.UIT.R, config={align = "cm", maxw = 1.3}, nodes={
                                {n=G.UIT.T, config={text = localize('b_next_round_2'), scale = 0.4, colour = G.C.WHITE, shadow = true}}
                            }}   
                            }},              
                        }},
                        mid_node,
                        {n=G.UIT.R, config={align = "cm", minw = 2.8, minh = 1.6, r=0.15,colour = G.C.GREEN, button = 'reroll_shop', func = 'can_reroll', hover = true,shadow = true}, nodes = {
                            {n=G.UIT.R, config={align = "cm", padding = 0.07, focus_args = {button = 'x', orientation = 'cr'}, func = 'set_button_pip'}, nodes={
                            {n=G.UIT.R, config={align = "cm", maxw = 1.3}, nodes={
                                {n=G.UIT.T, config={text = localize('k_reroll'), scale = 0.4, colour = G.C.WHITE, shadow = true}},
                            }},
                            {n=G.UIT.R, config={align = "cm", maxw = 1.3, minw = 1}, nodes={
                                {n=G.UIT.T, config={text = localize('$'), scale = 0.7, colour = G.C.WHITE, shadow = true}},
                                {n=G.UIT.T, config={ref_table = G.GAME.current_round, ref_value = 'reroll_cost', scale = 0.75, colour = G.C.WHITE, shadow = true}},
                            }}
                        }}
                        }},
                    low_node
                    }},
                }},
                config = {},
            },
            overflow = {
                node_config = { h = 3.3 },
            },
            sync_mode = "progress",
            scroll_move = function(self, dt)
                local button_summ = 2 + #G.low_buttons + #G.mid_buttons + #G.high_buttons
                if G.wheel_scroll and self.scroll_progress.y <= 1 and self.scroll_progress.y >= 0 then
                    self.scroll_progress.y = (self.scroll_progress.y + ((G.wheel_scroll * -1) * (0.3/button_summ)))
                elseif self.scroll_progress.y > 1 then
                    self.scroll_progress.y = 1
                elseif self.scroll_progress.y < 0 then
                    self.scroll_progress.y = 0
                end
            end,
        })
    shop_buttons = {n=G.UIT.O, config={object = shop_scrollbox}}
'''
match_indent = true

[[patches]]
[patches.pattern]
target = "functions/UI_definitions.lua"
pattern = '''
        {n=G.UIT.C, config={align = "cm", padding = 0.1}, nodes={
            {n=G.UIT.R,config={id = 'next_round_button', align = "cm", minw = 2.8, minh = 1.5, r=0.15,colour = G.C.RED, one_press = true, button = 'toggle_shop', hover = true,shadow = true}, nodes = {
                {n=G.UIT.R, config={align = "cm", padding = 0.07, focus_args = {button = 'y', orientation = 'cr'}, func = 'set_button_pip'}, nodes={
                    {n=G.UIT.R, config={align = "cm", maxw = 1.3}, nodes={
                        {n=G.UIT.T, config={text = localize('b_next_round_1'), scale = 0.4, colour = G.C.WHITE, shadow = true}}
                    }},
                    {n=G.UIT.R, config={align = "cm", maxw = 1.3}, nodes={
                        {n=G.UIT.T, config={text = localize('b_next_round_2'), scale = 0.4, colour = G.C.WHITE, shadow = true}}
                    }}   
                }},              
            }},
            {n=G.UIT.R, config={align = "cm", minw = 2.8, minh = 1.6, r=0.15,colour = G.C.GREEN, button = 'reroll_shop', func = 'can_reroll', hover = true,shadow = true}, nodes = {
                {n=G.UIT.R, config={align = "cm", padding = 0.07, focus_args = {button = 'x', orientation = 'cr'}, func = 'set_button_pip'}, nodes={
                    {n=G.UIT.R, config={align = "cm", maxw = 1.3}, nodes={
                        {n=G.UIT.T, config={text = localize('k_reroll'), scale = 0.4, colour = G.C.WHITE, shadow = true}},
                    }},
                    {n=G.UIT.R, config={align = "cm", maxw = 1.3, minw = 1}, nodes={
                        {n=G.UIT.T, config={text = localize('$'), scale = 0.7, colour = G.C.WHITE, shadow = true}},
                        {n=G.UIT.T, config={ref_table = G.GAME.current_round, ref_value = 'reroll_cost', scale = 0.75, colour = G.C.WHITE, shadow = true}},
                    }}
                }}
            }},
        }},
'''
position = "at"
payload = '''
    shop_buttons,
'''
match_indent = true

